<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap Badge Activity</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2>Student Dashboard</h2>

<button class="btn btn-primary m-2">
  Messages <span class="badge bg-danger">3</span>
</button>

<button class="btn btn-success m-2">
  Assignments <span class="badge bg-warning text-dark">1</span>
</button>

<button class="btn btn-secondary m-2">
  Notifications <span class="badge bg-danger">5</span>
</button>

</body>
</html>
